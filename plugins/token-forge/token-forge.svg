<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
  <defs>
    <linearGradient id="metal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A0AEC0"/>
      <stop offset="100%" stop-color="#4A5568"/>
    </linearGradient>
    <linearGradient id="anvil-face" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#718096"/>
      <stop offset="100%" stop-color="#2D3748"/>
    </linearGradient>
    <linearGradient id="glow" x1="0.5" y1="1" x2="0.5" y2="0">
      <stop offset="0%" stop-color="#FF6B35" stop-opacity="0.45"/>
      <stop offset="50%" stop-color="#FFD700" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#FFD700" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="hammer-metal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A0AEC0"/>
      <stop offset="100%" stop-color="#616E7C"/>
    </linearGradient>
    <linearGradient id="handle" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A67C2E"/>
      <stop offset="100%" stop-color="#6B4B12"/>
    </linearGradient>
    <linearGradient id="seg-header" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FC8181"/>
      <stop offset="100%" stop-color="#C53030"/>
    </linearGradient>
    <linearGradient id="seg-payload" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#B794F4"/>
      <stop offset="100%" stop-color="#6B46C1"/>
    </linearGradient>
    <linearGradient id="seg-signature" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#63B3ED"/>
      <stop offset="100%" stop-color="#2B6CB0"/>
    </linearGradient>
  </defs>

  <!-- All content wrapped in a group, shifted down 13px to center vertically -->
  <g transform="translate(0, 13)">

    <!-- Ambient fire glow -->
    <ellipse cx="64" cy="50" rx="28" ry="34" fill="url(#glow)"/>

    <!-- === Hammer (top, tilted) === -->
    <g transform="rotate(-20, 64, 20)">
      <!-- Handle -->
      <rect x="61.5" y="-2" width="5" height="18" rx="2" fill="url(#handle)"/>
      <!-- Hammer head -->
      <rect x="50" y="14" width="26" height="12" rx="3" fill="url(#hammer-metal)" stroke="#4A5568" stroke-width="0.8"/>
      <!-- Highlight on hammer -->
      <rect x="51" y="15" width="24" height="4" rx="2" fill="#CBD5E0" opacity="0.35"/>
    </g>

    <!-- === Sparks === -->
    <circle cx="46" cy="32" r="1.6" fill="#FFD700" opacity="0.95">
      <animate attributeName="opacity" values="0.95;0.4;0.95" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="62" cy="25" r="1.3" fill="#FFD700" opacity="0.9">
      <animate attributeName="opacity" values="0.9;0.3;0.9" dur="1.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="75" cy="28" r="1.7" fill="#FFD700" opacity="0.85">
      <animate attributeName="opacity" values="0.85;0.35;0.85" dur="1.3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="86" cy="34" r="1.2" fill="#FFD700" opacity="0.8">
      <animate attributeName="opacity" values="0.8;0.3;0.8" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="53" cy="27" r="1.1" fill="#FF6B35" opacity="0.8"/>
    <circle cx="82" cy="30" r="1.0" fill="#FF6B35" opacity="0.7"/>
    <circle cx="40" cy="36" r="0.9" fill="#FF6B35" opacity="0.6"/>
    <circle cx="90" cy="38" r="0.8" fill="#FF6B35" opacity="0.55"/>

    <!-- === Token segments (abstract multi-part structure) === -->
    <rect x="42" y="36" width="14" height="13" rx="3" fill="url(#seg-header)"/>
    <circle cx="59.5" cy="42.5" r="2" fill="#FFD700"/>
    <rect x="63" y="36" width="14" height="13" rx="3" fill="url(#seg-payload)"/>
    <circle cx="80.5" cy="42.5" r="2" fill="#FFD700"/>
    <rect x="84" y="36" width="14" height="13" rx="3" fill="url(#seg-signature)"/>

    <!-- === Anvil === -->
    <rect x="36" y="52" width="56" height="7" rx="2" fill="#A0AEC0"/>
    <rect x="36" y="52" width="56" height="2.5" rx="1" fill="#CBD5E0" opacity="0.6"/>
    <path d="M36 54.5 Q28 53 20 53 Q20 56 20 56 Q28 56.5 36 58 Z" fill="#8B9DAF" stroke="#4A5568" stroke-width="0.5"/>

    <path d="M32 70 L38 59 L90 59 L96 70 Z" fill="url(#anvil-face)" stroke="#4A5568" stroke-width="0.8"/>

    <path d="M59 62.5 L64 60 L69 62.5 L69 68 L64 70.5 L59 68 Z" fill="none" stroke="#FFD700" stroke-width="0.8" opacity="0.5"/>
    <path d="M62 64 L64 63 L66 64 L66 66.5 L64 67.5 L62 66.5 Z" fill="#FFD700" opacity="0.25"/>

    <path d="M34 70 L30 81 L98 81 L94 70 Z" fill="#4A5568" stroke="#2D3748" stroke-width="0.8"/>
    <rect x="28" y="81" width="72" height="5" rx="2.5" fill="#2D3748"/>

    <!-- === Text: TOKEN FORGE === -->
    <text x="64" y="100" text-anchor="middle" font-family="'SF Mono', 'Fira Code', 'Courier New', monospace" font-size="8.5" font-weight="bold" fill="none" stroke="#4A5568" stroke-width="0.7" letter-spacing="2.5">TOKEN FORGE</text>

  </g>
</svg>
